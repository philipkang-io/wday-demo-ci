name: Automated API tests using Postman CLI

on: push

jobs:
  automated-api-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Postman CLI
        run: |
          curl -o- "https://dl-cli.pstmn.io/install/linux64.sh" | sh
      - name: Login to Postman CLI
        run: postman login --with-api-key ${{ secrets.POSTMAN_API_KEY }}
      - name: Lint Workday Staffing v6 spec
        continue-on-error: true
        run: |
          postman spec lint "89f8ac80-f66c-418c-9d8d-80ce965fe5c9" \
            --workspace-id "5b18a086-833b-4346-af5f-95a1eb672e4c" \
            --fail-severity error --output json --report-events
      - name: Run API tests
        env:
          WORKDAY_BEARER_TOKEN: ${{ secrets.WORKDAY_BEARER_TOKEN }}
        run: |
          # Substitute the bearer token literally into the collection auth
          # definition before running. The auth uses {{vault:wd_bearer_token}}
          # (V12 Vault prefix) which the CLI tries to resolve via Postman Vault;
          # API-key auth in CI cannot read the vault, so the token resolves to
          # empty and the request 401s. sed substitution bypasses vault lookup
          # entirely by baking the literal token into the auth definition.
          # sed -i "s|{{vault:wd_bearer_token}}|${WORKDAY_BEARER_TOKEN}|g" postman/collections/worker-demo/.resources/definition.yaml
          # postman collection run ./postman/collections/worker-demo/ \
          #  --env-var "liveBaseUrl=https://restapi-sandboxgmspreviewhotpatch.workdaysuv.com/api/staffing/v6/gms" \
          #  --env-var "mockBaseUrl=https://3777f45c-631f-47a8-8b14-71483fe7e8aa.mock.pstmn.io" \
          #  --report-events
          postman collection run "52509354-d6cd65db-36ba-448b-9f89-a2154462cdfb" -e "52509354-ea9fbd53-5aca-4520-91e3-b3c564d698bb" --report-events
