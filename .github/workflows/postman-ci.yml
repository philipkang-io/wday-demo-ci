name: Automated API tests using Postman CLI

on: push

jobs:
  automated-api-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Postman CLI
        run: |
          curl -o- "https://dl-cli.pstmn.io/install/linux64.sh" | sh
      - name: Login to Postman CLI
        run: postman login --with-api-key ${{ secrets.POSTMAN_API_KEY }}
      - name: Lint Workday Staffing v6 spec
        continue-on-error: true
        run: |
          postman spec lint "89f8ac80-f66c-418c-9d8d-80ce965fe5c9" \
            --workspace-id "5b18a086-833b-4346-af5f-95a1eb672e4c" \
            --fail-severity error --output json --report-events
      - name: Run API tests
        env:
          WORKDAY_BEARER_TOKEN: ${{ secrets.WORKDAY_BEARER_TOKEN }}
        run: |
          cat > /tmp/ci-env.json <<EOF
          {
            "name": "ci-env",
            "values": [
              {"key": "wd_bearer_token", "value": "${WORKDAY_BEARER_TOKEN}", "enabled": true, "type": "secret"},
              {"key": "liveBaseUrl", "value": "https://restapi-sandboxgmspreviewhotpatch.workdaysuv.com/api/staffing/v6/gms", "enabled": true, "type": "default"},
              {"key": "mockBaseUrl", "value": "https://3777f45c-631f-47a8-8b14-71483fe7e8aa.mock.pstmn.io", "enabled": true, "type": "default"}
            ]
          }
          EOF
          postman collection run ./postman/collections/worker-demo/ -e /tmp/ci-env.json --report-events
