$kind: http-request
name: 1. GET workers — using workday-test-helpers package
url: "{{liveBaseUrl}}/workers?search=Adam"
method: GET
headers:
  Accept: application/json
queryParams:
  search: Adam
scripts:
  - type: afterResponse
    code: |-
      const { assertWorkerSchema, assertSearchBehavior, assertWorkerRequiredProperties } =
        pm.require('@philip-kang-v12-160978/workday-test-helpers');

        pm.test('Status code is 200', function () {
            pm.response.to.have.status(200);
        });

        pm.test('Each worker has required properties', function () {
            assertWorkerRequiredProperties(pm.response.json());
        });

        pm.test('Response conforms to OpenAPI schema for /workers', function () {
            assertWorkerSchema(pm.response);
        });

        pm.test('Search filter actually filtered — every worker matches search term', function () {
            assertSearchBehavior(pm.request, pm.response.json(), 'search');
        });

        // Chain — save first worker's id for downstream requests
        const data = pm.response.json();
        if (data && data.data && data.data.length > 0) {
            pm.collectionVariables.set('firstWorkerId', data.data[0].id);
            console.log('Saved firstWorkerId =', data.data[0].id, '(' + data.data[0].descriptor + ')');
        }
    language: text/javascript
    packages:
      "@philip-kang-v12-160978/workday-test-helpers":
        id: 019e1a86-99ac-7e36-b917-111e7947cb6a
order: 1367
